<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="660" viewBox="0 0 1500 660">
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="10" refY="5.5" orient="auto">
      <path d="M1,1 L10,5.5 L1,10 Z" fill="#334155"/>
    </marker>
    <style>
      .title{font-family:Arial,sans-serif;font-size:30px;font-weight:700;fill:#0f172a}
      .label{font-family:Arial,sans-serif;font-size:18px;font-weight:700;fill:#0f172a}
      .text{font-family:Arial,sans-serif;font-size:14px;fill:#334155}
      .small{font-family:Arial,sans-serif;font-size:13px;fill:#475569}
      .box{stroke-width:2;rx:10}
      .arrow{stroke:#334155;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1500" height="660" fill="#ffffff"/>
  <text x="80" y="60" class="title">Constructing Noise and Hard Negatives</text>
  <text x="80" y="90" class="small">Build each noise type separately so its utility can be measured.</text>

  <rect x="90" y="170" width="230" height="105" class="box" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="115" y="205" class="label">Clean examples</text>
  <text x="115" y="235" class="text">risk labels +</text>
  <text x="115" y="255" class="text">auxiliary JSON</text>

  <rect x="430" y="100" width="260" height="105" class="box" fill="#fff7ed" stroke="#ea580c"/>
  <text x="455" y="135" class="label">Input perturbation</text>
  <text x="455" y="165" class="text">typos, deletion,</text>
  <text x="455" y="185" class="text">punctuation, ASR</text>

  <rect x="430" y="300" width="260" height="105" class="box" fill="#ecfdf5" stroke="#059669"/>
  <text x="455" y="335" class="label">Hard negatives</text>
  <text x="455" y="365" class="text">negation, history,</text>
  <text x="455" y="385" class="text">supportive posts</text>

  <rect x="800" y="100" width="260" height="105" class="box" fill="#fefce8" stroke="#ca8a04"/>
  <text x="825" y="135" class="label">Relabel evidence</text>
  <text x="825" y="165" class="text">map spans or regenerate</text>
  <text x="825" y="185" class="text">exact noisy spans</text>

  <rect x="800" y="300" width="260" height="105" class="box" fill="#f5f3ff" stroke="#7c3aed"/>
  <text x="825" y="335" class="label">Human/teacher check</text>
  <text x="825" y="365" class="text">confirm low-risk</text>
  <text x="825" y="385" class="text">or uncertainty</text>

  <rect x="1170" y="200" width="250" height="125" class="box" fill="#fce7f3" stroke="#db2777"/>
  <text x="1195" y="235" class="label">Augmented train</text>
  <text x="1195" y="265" class="text">clean + noisy copies</text>
  <text x="1195" y="285" class="text">+ accepted hard negatives</text>

  <rect x="440" y="515" width="620" height="60" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="465" y="550" class="small">Never reuse old evidence spans if the noisy text no longer contains them exactly.</text>

  <line x1="320" y1="222" x2="430" y2="152" class="arrow"/>
  <line x1="320" y1="222" x2="430" y2="352" class="arrow"/>
  <line x1="690" y1="152" x2="800" y2="152" class="arrow"/>
  <line x1="690" y1="352" x2="800" y2="352" class="arrow"/>
  <line x1="1060" y1="152" x2="1170" y2="245" class="arrow"/>
  <line x1="1060" y1="352" x2="1170" y2="285" class="arrow"/>
</svg>
