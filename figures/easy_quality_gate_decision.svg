<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="660" viewBox="0 0 1500 660">
  <defs>
    <marker id="arrow3" markerWidth="11" markerHeight="11" refX="10" refY="5.5" orient="auto">
      <path d="M1,1 L10,5.5 L1,10 Z" fill="#334155"/>
    </marker>
    <style>
      .title{font-family:Arial,sans-serif;font-size:30px;font-weight:700;fill:#0f172a}
      .label{font-family:Arial,sans-serif;font-size:18px;font-weight:700;fill:#0f172a}
      .text{font-family:Arial,sans-serif;font-size:14px;fill:#334155}
      .small{font-family:Arial,sans-serif;font-size:13px;fill:#475569}
      .box{stroke-width:2;rx:10}
      .diamond{stroke-width:2}
      .arrow{stroke:#334155;stroke-width:2.4;fill:none;marker-end:url(#arrow3)}
    </style>
  </defs>
  <rect width="1500" height="660" fill="#ffffff"/>
  <text x="55" y="60" class="title">Quality Gate Decision Tree</text>
  <text x="55" y="90" class="small">Every generated label is accepted, regenerated, audited, or dropped.</text>

  <rect x="90" y="155" width="210" height="90" class="box" fill="#fff7ed" stroke="#ea580c"/>
  <text x="115" y="190" class="label">Teacher output</text>
  <text x="115" y="220" class="text">candidate JSON</text>

  <polygon points="475,140 620,205 475,270 330,205" class="diamond" fill="#fefce8" stroke="#ca8a04"/>
  <text x="405" y="195" class="label">Valid JSON</text>
  <text x="410" y="218" class="text">and schema?</text>

  <polygon points="795,140 940,205 795,270 650,205" class="diamond" fill="#fefce8" stroke="#ca8a04"/>
  <text x="720" y="195" class="label">Exact evidence</text>
  <text x="730" y="218" class="text">from input?</text>

  <polygon points="1115,140 1260,205 1115,270 970,205" class="diamond" fill="#fefce8" stroke="#ca8a04"/>
  <text x="1045" y="195" class="label">Safe and</text>
  <text x="1032" y="218" class="text">supported rationale?</text>

  <rect x="1030" y="365" width="245" height="90" class="box" fill="#f5f3ff" stroke="#7c3aed"/>
  <text x="1055" y="400" class="label">Human audit</text>
  <text x="1055" y="430" class="text">high risk, disagreement,</text>
  <text x="1055" y="448" class="text">low score, uncertainty</text>

  <rect x="640" y="365" width="245" height="90" class="box" fill="#fce7f3" stroke="#db2777"/>
  <text x="665" y="400" class="label">Accept for training</text>
  <text x="665" y="430" class="text">clean, grounded, safe</text>

  <rect x="270" y="365" width="245" height="90" class="box" fill="#fee2e2" stroke="#dc2626"/>
  <text x="295" y="400" class="label">Regenerate / drop</text>
  <text x="295" y="430" class="text">bad JSON, invented facts,</text>
  <text x="295" y="448" class="text">missing evidence</text>

  <line x1="300" y1="200" x2="330" y2="205" class="arrow"/>
  <line x1="620" y1="205" x2="650" y2="205" class="arrow"/>
  <line x1="940" y1="205" x2="970" y2="205" class="arrow"/>
  <path d="M475 270 C475 320, 392 320, 392 365" class="arrow"/>
  <path d="M795 270 C795 315, 763 320, 763 365" class="arrow"/>
  <path d="M1115 270 C1115 320, 1152 320, 1152 365" class="arrow"/>
  <path d="M1115 270 C1115 330, 763 330, 763 365" class="arrow"/>

  <text x="625" y="192" class="small">yes</text>
  <text x="945" y="192" class="small">yes</text>
  <text x="445" y="315" class="small">no</text>
  <text x="775" y="315" class="small">no</text>
  <text x="1135" y="315" class="small">risky</text>
  <text x="940" y="340" class="small">clean</text>

  <rect x="90" y="545" width="1320" height="48" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="112" y="575" class="small">Rule of thumb: all tier-3/high-imminent cases go to human audit even if the teacher output looks good.</text>
</svg>
